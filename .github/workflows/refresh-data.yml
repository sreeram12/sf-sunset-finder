name: Refresh venue data

on:
  schedule:
    - cron: '0 6  * * *'   # 6 AM  UTC = 10 PM PT
    - cron: '0 18 * * *'   # 6 PM  UTC = 10 AM PT
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

permissions:
  contents: write   # needed to commit and push updated JSON

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # silence Node 20 deprecation warnings

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT_RUN_WORKFLOWS }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch fresh venue and building data
        run: npm run fetch-data

      - name: Commit if data changed
        env:
          GH_PAT: ${{ secrets.GH_PAT_RUN_WORKFLOWS }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/sreeram12/sf-sunset-finder.git
          git add -f public/data/venues.json public/data/buildings.json
          git diff --staged --quiet && echo "No changes, skipping commit" || (
            git commit -m "chore: refresh venue and building data [skip ci]" &&
            git push
          )
